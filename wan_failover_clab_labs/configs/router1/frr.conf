frr version 8.0
frr defaults traditional
hostname router1
log syslog informational
no ipv6 forwarding

interface eth1
 description WAN-LINK-1-PRIMARY
 ip address 10.0.0.1/30
!
interface eth2
 description WAN-LINK-2-BACKUP
 ip address 10.0.1.1/30
!

! Static route to Router2 LAN via PRIMARY link (lower metric = preferred)
ip route 192.168.2.0/24 10.0.0.2 10
! Static route to Router2 LAN via BACKUP link (higher metric = standby)
ip route 192.168.2.0/24 10.0.1.2 20

line vty
!